version: 2

project_name: hypogeum

before:
  hooks:
    - go mod tidy

builds:
  - id: hypogeum
    main: ./cmd/hypogeum
    binary: hypogeum
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: hypogeum
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Refactors
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 2
    - title: Docs
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: wilkes
    name: hypogeum
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    `hypogeum` is a terminal markdown browser. Download the archive for your
    platform below, extract, and put the `hypogeum` binary on your `$PATH`.
  footer: |
    ---
    Verify the download with `checksums.txt`. Run `hypogeum --version` to
    confirm the build you're running.
